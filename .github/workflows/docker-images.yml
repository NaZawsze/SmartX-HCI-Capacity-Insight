name: Docker Images

on:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: web-api
            context: .
            dockerfile: ./backend/Dockerfile
            image: smartx-hci-capacity-insight-web-api
          - name: collector-worker
            context: .
            dockerfile: ./backend/Dockerfile.worker
            image: smartx-hci-capacity-insight-collector-worker
          - name: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
            image: smartx-hci-capacity-insight-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ startsWith(github.ref, 'refs/tags/') && 'main' || github.ref }}
          fetch-depth: 0

      - name: Verify release tag points to main
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          git fetch --force origin "refs/heads/main:refs/remotes/origin/main" "refs/tags/${GITHUB_REF_NAME}:refs/tags/${GITHUB_REF_NAME}"
          tag_commit="$(git rev-list -n 1 "${GITHUB_REF_NAME}")"
          main_commit="$(git rev-parse origin/main)"
          echo "tag ${GITHUB_REF_NAME} -> ${tag_commit}"
          echo "origin/main -> ${main_commit}"
          if [ "${tag_commit}" != "${main_commit}" ]; then
            echo "Release tag ${GITHUB_REF_NAME} must point to origin/main before building images." >&2
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: docker.io/${{ vars.DOCKERHUB_NAMESPACE || secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
