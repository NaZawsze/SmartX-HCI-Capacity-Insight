name: Upgrade Runner Image

on:
  workflow_dispatch:
    inputs:
      runner_version:
        description: "Runner image tag, for example v0.2.2"
        required: true
        default: "v0.2.2"
  push:
    tags:
      - "runner-v*"

jobs:
  build:
    name: Build upgrade-runner
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve runner tag
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ github.event.inputs.runner_version }}"
          else
            tag="${GITHUB_REF_NAME#runner-}"
          fi
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([A-Za-z0-9._-]+)?$ ]]; then
            echo "Invalid runner tag: $tag" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: docker.io/${{ vars.DOCKERHUB_NAMESPACE || secrets.DOCKERHUB_USERNAME }}/smartx-hci-capacity-insight-upgrade-runner
          tags: |
            type=raw,value=${{ steps.version.outputs.tag }}
            type=sha,prefix=runner-sha-

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./backend/Dockerfile.upgrade
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=upgrade-runner
          cache-to: type=gha,mode=max,scope=upgrade-runner
