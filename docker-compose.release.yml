services:
  web-api:
    image: ${SMARTX_IMAGE_PREFIX:-docker.io/nazawsze}/smartx-hci-capacity-insight-web-api:${SMARTX_IMAGE_TAG:-v0.4.1}
    env_file:
      - .env
    environment:
      TZ: Asia/Shanghai
      SMARTX_PROJECT_PATH: /opt/smartx-storage-forecast
      SMARTX_COMPOSE_FILE: docker-compose.release.yml
      SMARTX_COMPOSE_PROJECT_NAME: smartx-capacity-insight
      SMARTX_DB_PATH: /data/smartx.db
      SMARTX_PROMETHEUS_DATA_PATH: /prometheus-data
    volumes:
      - /data/smartx-capacity-insight-data/app:/data
      - /data/upgrades:/data/upgrades
      - /data/backups:/data/backups
      - /data/exports:/data/exports
      - /data/compose-runtime:/data/compose-runtime
      - /data/smartx-capacity-insight-data/prometheus:/prometheus-data
      - .:/opt/smartx-storage-forecast:ro
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8000:8000"
    depends_on:
      - prometheus
    networks:
      - smartx-net
    restart: unless-stopped

  collector-worker:
    image: ${SMARTX_IMAGE_PREFIX:-docker.io/nazawsze}/smartx-hci-capacity-insight-collector-worker:${SMARTX_IMAGE_TAG:-v0.4.1}
    command: ["python", "-m", "app.v2.worker"]
    env_file:
      - .env
    environment:
      TZ: Asia/Shanghai
      SMARTX_DB_PATH: /data/smartx.db
    volumes:
      - /data/smartx-capacity-insight-data/app:/data
      - /data/upgrades:/data/upgrades
      - /data/backups:/data/backups
      - /data/exports:/data/exports
      - /data/compose-runtime:/data/compose-runtime
    expose:
      - "9108"
    depends_on:
      - prometheus
    networks:
      - smartx-net
    restart: unless-stopped

  frontend:
    image: ${SMARTX_IMAGE_PREFIX:-docker.io/nazawsze}/smartx-hci-capacity-insight-frontend:${SMARTX_IMAGE_TAG:-v0.4.1}
    environment:
      TZ: Asia/Shanghai
    ports:
      - "8080:80"
    depends_on:
      - web-api
    networks:
      - smartx-net
    restart: unless-stopped

  upgrade-runner:
    image: ${SMARTX_IMAGE_PREFIX:-docker.io/nazawsze}/smartx-hci-capacity-insight-upgrade-runner:${SMARTX_RUNNER_IMAGE_TAG:-v0.2.2}
    command: ["python", "-m", "app.v2.upgrade.runner"]
    env_file:
      - .env
    environment:
      TZ: Asia/Shanghai
      SMARTX_PROJECT_PATH: /opt/smartx-storage-forecast
      SMARTX_COMPOSE_FILE: docker-compose.release.yml
      SMARTX_COMPOSE_PROJECT_NAME: smartx-capacity-insight
      SMARTX_DB_PATH: /data/smartx.db
      SMARTX_PROMETHEUS_DATA_PATH: /prometheus-data
    volumes:
      - .:/opt/smartx-storage-forecast
      - /data/smartx-capacity-insight-data/app:/data
      - /data/upgrades:/data/upgrades
      - /data/backups:/data/backups
      - /data/exports:/data/exports
      - /data/compose-runtime:/data/compose-runtime
      - /data/smartx-capacity-insight-data/prometheus:/prometheus-data
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - prometheus
    networks:
      - smartx-net
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.55.1
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=400d"
    environment:
      TZ: CST-8
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - /data/smartx-capacity-insight-data/prometheus:/prometheus
    ports:
      - "9090:9090"
    networks:
      - smartx-net
    restart: unless-stopped


networks:
  smartx-net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.249.249.0/24
