services:
  web-api:
    image: smartx-storage-forecast-web-api:local
    build:
      context: ./backend
    env_file:
      - .env
    volumes:
      - smartx-data:/data
      - prometheus-data:/prometheus-data
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8000:8000"
    depends_on:
      - prometheus
    restart: unless-stopped

  collector-worker:
    image: smartx-storage-forecast-collector-worker:local
    build:
      context: ./backend
    command: ["python", "-m", "app.collector.worker"]
    env_file:
      - .env
    volumes:
      - smartx-data:/data
    expose:
      - "9108"
    depends_on:
      - prometheus
    restart: unless-stopped

  frontend:
    image: smartx-storage-forecast-frontend:local
    build:
      context: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - web-api
    restart: unless-stopped

  upgrade-runner:
    image: smartx-storage-forecast-upgrade-runner:local
    build:
      context: ./backend
    command: ["python", "-m", "app.upgrade.runner"]
    env_file:
      - .env
    environment:
      SMARTX_PROJECT_PATH: /workspace
    volumes:
      - .:/workspace
      - smartx-data:/data
      - prometheus-data:/prometheus-data
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - web-api
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.55.1
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=400d"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped

volumes:
  smartx-data:
  prometheus-data:

